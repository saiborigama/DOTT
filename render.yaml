services:
  - type: web
    name: dott-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: PUBLIC_BASE_URL
        value: https://dott-backend.onrender.com
      - key: CORS_ORIGINS
        value: http://localhost:3001,http://localhost:3002,http://localhost:3003,http://localhost:3004,http://localhost:5173
      - key: CORS_ORIGIN_REGEX
        value: ^https://.*\.onrender\.com$
